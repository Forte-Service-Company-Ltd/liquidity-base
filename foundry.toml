[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
viaIR = false
solc_version = "0.8.24"
gas_limit = "18446744073709551615"



remappings = ["forge-std/=lib/forge-std/src/",
    "ds-test/=lib/forge-std/lib/ds-test/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "solady/=lib/solady/src/"]